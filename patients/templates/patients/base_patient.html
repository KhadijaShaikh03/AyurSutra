<!DOCTYPE html>
<html>
<head>
    <title>Patient Panel</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            display: flex;
            font-family: 'Segoe UI', sans-serif;
            background: #f5f7fb;
        }

        /* 🔷 Sidebar */
        .sidebar {
            width: 250px;
            height: 100vh;
            background: linear-gradient(180deg, #198754, #157347);
            color: white;
            padding: 20px;
            position: fixed;
        }

        .sidebar h4 {
            font-weight: bold;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: rgba(255,255,255,0.2);
            transform: translateX(5px);
        }

        .sidebar a.active {
            background: white;
            color: #198754;
            font-weight: 600;
        }

        /* 🔷 Content */
        .main-content {
            margin-left: 250px;
            width: 100%;
            padding: 30px;
        }

        /* 🔷 Cards Enhancement */
        .card {
            border: none;
            border-radius: 15px;
        }

        .card:hover {
            transform: translateY(-3px);
            transition: 0.3s;
        }
    </style>
</head>

<body>

<!-- 🌿 SIDEBAR -->
<div class="sidebar">
    <h4>🌿 Ayursutra</h4>

    <a href="{% url 'patient_dashboard' %}" 
       class="{% if 'dashboard' in request.path %}active{% endif %}">
        <i class="bi bi-house-door"></i> Dashboard
    </a>

    <a href="{% url 'patient_diet_plan' %}">
        <i class="bi bi-egg-fried"></i> Diet Plan
    </a>

    <a href="{% url 'patient_prescriptions' %}">
        <i class="bi bi-file-earmark-medical"></i> Prescriptions
    </a>

    <a href="{% url 'patient_precautions' %}">
        <i class="bi bi-exclamation-triangle"></i> Precautions
    </a>

    <a href="{% url 'patient_appointments' %}">
        <i class="bi bi-calendar-check"></i> Appointments
    </a>

    <hr>

    <a href="{% url 'patient_logout' %}">
        <i class="bi bi-box-arrow-right"></i> Logout
    </a>
</div>

<!-- 🔷 MAIN -->
<div class="main-content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
