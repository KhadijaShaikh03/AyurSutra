<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ayursutra | Welcome</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #e6f4ea, #f8fbf9);
            overflow: hidden;
        }

        /* Center container */
        .main-container {
            height: 100vh;
        }

        /* Glass card */
        .card-glass {
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            animation: fadeInUp 1s ease;
        }

        /* Title */
        .title {
            font-weight: 600;
            color: #2e7d32;
        }

        /* Subtitle */
        .subtitle {
            color: #555;
            margin-bottom: 30px;
        }

        /* Buttons */
        .btn-custom {
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .btn-patient {
            background: #2e7d32;
            color: white;
        }

        .btn-patient:hover {
            background: #1b5e20;
            transform: translateY(-3px) scale(1.03);
        }

        .btn-admin {
            background: #212529;
            color: white;
        }

        .btn-admin:hover {
            background: #000;
            transform: translateY(-3px) scale(1.03);
        }

        /* Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Floating background circles */
        .circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.2;
            animation: float 6s infinite ease-in-out;
        }

        .circle1 {
            width: 200px;
            height: 200px;
            background: #81c784;
            top: 10%;
            left: 10%;
        }

        .circle2 {
            width: 300px;
            height: 300px;
            background: #66bb6a;
            bottom: 10%;
            right: 10%;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>

<body>

<!-- Background animation -->
<div class="circle circle1"></div>
<div class="circle circle2"></div>

<div class="container d-flex justify-content-center align-items-center main-container">
    
    <div class="card-glass text-center">

        <h1 class="title mb-3">Welcome to Ayursutra</h1>
        <p class="subtitle">Your Digital Ayurvedic Clinic System</p>

        <div class="d-flex flex-column flex-md-row gap-4 justify-content-center">

            <!-- Patient Button -->
            <a href="{% url 'patient_login' %}" class="btn btn-custom btn-patient">
                👤 Patient Login
            </a>

            <!-- Admin Button -->
            <a href="/secure-admin/login/?next=/dashboard/" class="btn btn-custom btn-admin">
                🩺 Doctor / Admin
            </a>

        </div>

    </div>

</div>

</body>
</html>
