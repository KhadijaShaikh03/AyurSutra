{% extends "base.html" %}

{% block content %}

<h2>Delete Patient</h2>

<div class="card">
    <div class="card-body">

        <p>Are you sure you want to delete <strong>{{ patient.name }}</strong>?</p>

        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="/patients/" class="btn btn-secondary">Cancel</a>
        </form>

    </div>
</div>

{% endblock %}
