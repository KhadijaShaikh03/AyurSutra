{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Patient Form</h2>

<div class="card">
    <div class="card-body">

        <form method="POST">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-success">Save</button>
            <a href="/patients/" class="btn btn-secondary">Cancel</a>
        </form>

    </div>
</div>

{% endblock %}
