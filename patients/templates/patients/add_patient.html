{% extends "base.html" %}

{% block content %}

<style>
    .form-wrapper {
        max-width: 850px;
        margin: auto;
        animation: fadeIn 0.6s ease-in-out;
    }

    .form-card {
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        border: none;
    }

    .form-title {
        font-weight: 600;
        color: #2e7d32;
    }

    .form-label {
        font-weight: 500;
        margin-bottom: 5px;
    }

    .form-control {
        border-radius: 10px;
        padding: 10px;
        transition: all 0.2s ease;
    }

    .form-control:focus {
        border-color: #2e7d32;
        box-shadow: 0 0 0 0.15rem rgba(46,125,50,0.2);
    }

    .btn-submit {
        background-color: #2e7d32;
        border-radius: 10px;
        padding: 10px 25px;
        font-weight: 500;
    }

    .btn-submit:hover {
        background-color: #1b5e20;
    }

    .btn-cancel {
        border-radius: 10px;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px);}
        to { opacity: 1; transform: translateY(0);}
    }
</style>

<div class="container form-wrapper mt-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="form-title">➕ Add New Patient</h3>
        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary btn-cancel">← Back</a>
    </div>

    <div class="card form-card">
        <div class="card-body p-4">

            <!-- Error Messages -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="row">

                    <!-- Name -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="name" class="form-control" placeholder="Enter full name" required>
                    </div>

                    <!-- Age -->
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Age</label>
                        <input type="number" name="age" class="form-control" placeholder="Age" required>
                    </div>

                    <!-- Gender -->
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Gender</label>
                        <select name="gender" class="form-control">
                            <option value="">Select</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <!-- Phone -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" name="phone" class="form-control" placeholder="Enter phone number">
                    </div>

                </div>

                <!-- Buttons -->
                <div class="d-flex justify-content-end gap-3 mt-3">
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary btn-cancel">Cancel</a>
                    <button type="submit" class="btn btn-submit text-white">Save Patient</button>
                </div>

            </form>

        </div>
    </div>

</div>

{% endblock %}
