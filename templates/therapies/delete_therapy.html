{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">

    <h3>Delete Therapy</h3>
    <p>Are you sure you want to delete <strong>{{ therapy.therapy_name }}</strong>?</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'therapies' %}" class="btn btn-secondary">Cancel</a>
    </form>

</div>
{% endblock %}
