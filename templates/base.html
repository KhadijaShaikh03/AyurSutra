<!DOCTYPE html>
<html>
<head>
    <title>Ayursutra</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    {% load static %}
    <link rel="stylesheet" href="{% static 'patients/css/style.css' %}">
</head>

<body>

    <!-- 🔷 SIDEBAR -->
    <div class="sidebar">
        <h4 class="mb-4">🌿 Ayursutra</h4>
    <a href="{% url 'dashboard' %}" class="nav-link {% if request.path == '/' %}active{% endif %}">
        🏠 Dashboard
    </a>

    <a href="{% url 'patients' %}" class="nav-link {% if 'patients' in request.path %}active{% endif %}">
        👤 Patients
    </a>

    <a href="{% url 'therapies' %}" class="nav-link {% if 'therapies' in request.path %}active{% endif %}">
        💆 Therapies
    </a>

    <a href="{% url 'appointments' %}" class="nav-link {% if 'appointments' in request.path %}active{% endif %}">
        📅 Appointments
    </a>
    </div>

    <!-- 🔷 MAIN CONTENT -->
    <div class="main-content">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
